<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lönegrundande samtal · Ahlsell Region 83</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<style>
:root {
  --p: #003865;
  --p2: #1565a0;
  --p3: #1a7bc4;
  --pxl: #e8f0f8;
  --acc: #e8640c;
  --acc2: #ff8c3b;
  --bg: #f0f3f7;
  --card: #ffffff;
  --border: #dde3ec;
  --text: #1a2332;
  --muted: #64748b;
  --over-bg: #d1fae5; --over-bd: #6ee7b7; --over-tx: #065f46;
  --all-bg:  #dbeafe; --all-bd:  #93c5fd; --all-tx:  #1e3a8a;
  --most-bg: #fef3c7; --most-bd: #fcd34d; --most-tx: #78350f;
  --some-bg: #fee2e2; --some-bd: #fca5a5; --some-tx: #7f1d1d;
  --radius: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.06);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.12);
  --font-head: 'Bricolage Grotesque', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --sidebar-w: 260px;
  --trans: .22s cubic-bezier(.4,0,.2,1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; scroll-behavior: smooth; }
body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }

/* ── Layout ─────────────────────────────────────────────────────── */
#shell { display: flex; min-height: 100vh; }
#sidebar {
  width: var(--sidebar-w); flex-shrink: 0; background: var(--p);
  display: flex; flex-direction: column; position: fixed; top: 0; left: 0;
  height: 100vh; overflow-y: auto; z-index: 100;
  transition: transform var(--trans);
}
#main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

/* ── Sidebar ────────────────────────────────────────────────────── */
.sb-brand {
  padding: 24px 20px 16px;
  border-bottom: 1px solid rgba(255,255,255,.1);
}
.sb-logo-text {
  font-family: var(--font-head); font-weight: 800; font-size: 1.15rem;
  color: #fff; letter-spacing: -.5px; line-height: 1.1;
}
.sb-logo-sub { font-size: .72rem; color: rgba(255,255,255,.55); letter-spacing: .5px; margin-top: 2px; }
.sb-role-pill {
  margin: 12px 20px 0;
  background: rgba(255,255,255,.12); border-radius: 999px;
  padding: 5px 12px; font-size: .75rem; font-weight: 600;
  color: rgba(255,255,255,.9); letter-spacing: .3px;
  border: 1px solid rgba(255,255,255,.15);
  display: flex; align-items: center; gap: 6px;
  transition: all var(--trans); cursor: pointer;
}
.sb-role-pill .dot { width:7px;height:7px;border-radius:50%;background:var(--acc2);flex-shrink:0; }
.sb-steps { padding: 20px 0; flex: 1; }
.sb-step {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 10px 20px; cursor: pointer;
  transition: background var(--trans); position: relative;
  text-decoration: none;
}
.sb-step:hover { background: rgba(255,255,255,.07); }
.sb-step.active { background: rgba(255,255,255,.12); }
.sb-step.active::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; background: var(--acc2); border-radius: 0 2px 2px 0;
}
.step-num {
  width: 26px; height: 26px; border-radius: 50%; border: 2px solid rgba(255,255,255,.2);
  display: flex; align-items: center; justify-content: center;
  font-size: .7rem; font-weight: 700; color: rgba(255,255,255,.4);
  flex-shrink: 0; transition: all var(--trans); margin-top: 1px;
}
.sb-step.done .step-num { background: var(--acc); border-color: var(--acc); color: #fff; }
.sb-step.active .step-num { border-color: var(--acc2); color: var(--acc2); }
.step-label { font-size: .8rem; font-weight: 500; color: rgba(255,255,255,.45); line-height: 1.35; transition: color var(--trans); }
.sb-step.active .step-label { color: rgba(255,255,255,.95); font-weight: 600; }
.sb-step.done .step-label { color: rgba(255,255,255,.65); }
.step-sub { font-size: .7rem; color: rgba(255,255,255,.3); margin-top: 1px; }
.sb-foot { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,.1); }
.sb-help { font-size: .72rem; color: rgba(255,255,255,.35); line-height: 1.5; }

/* ── Top bar ────────────────────────────────────────────────────── */
#topbar {
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 0 32px; height: 56px; display: flex; align-items: center;
  justify-content: space-between; position: sticky; top: 0; z-index: 50;
  box-shadow: 0 1px 4px rgba(0,0,0,.05);
}
.topbar-title { font-family: var(--font-head); font-weight: 700; font-size: .95rem; color: var(--p); }
.topbar-actions { display: flex; gap: 10px; align-items: center; }
.progress-ring { display: flex; align-items: center; gap: 8px; font-size: .75rem; color: var(--muted); }
.progress-bar { width: 100px; height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--acc); transition: width .4s ease; }
.btn-print {
  display: flex; align-items: center; gap: 6px;
  background: var(--pxl); color: var(--p); border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 14px; font-size: .78rem; font-weight: 600;
  cursor: pointer; transition: all var(--trans); font-family: var(--font-body);
}
.btn-print:hover { background: var(--p); color: #fff; }
.btn-menu { display:none; background:none; border:none; cursor:pointer; color:var(--p); font-size:1.3rem; }

/* ── Content ────────────────────────────────────────────────────── */
#content { flex: 1; padding: 32px; max-width: 900px; width: 100%; margin: 0 auto; }
.step-view { animation: fadeUp .3s ease; }
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

/* ── Nav footer ─────────────────────────────────────────────────── */
#navfoot {
  background: var(--card); border-top: 1px solid var(--border);
  padding: 16px 32px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; bottom: 0; z-index: 50;
}
.btn { display: inline-flex; align-items: center; gap: 8px; border: none; border-radius: 10px; padding: 10px 22px; font-size: .87rem; font-weight: 600; cursor: pointer; transition: all var(--trans); font-family: var(--font-body); }
.btn-ghost { background: transparent; color: var(--muted); border: 1.5px solid var(--border); }
.btn-ghost:hover { background: var(--bg); color: var(--text); }
.btn-primary { background: var(--p); color: #fff; }
.btn-primary:hover { background: var(--p2); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,56,101,.3); }
.btn-acc { background: var(--acc); color: #fff; }
.btn-acc:hover { background: var(--acc2); transform: translateY(-1px); }
.btn:disabled { opacity: .4; cursor: not-allowed; transform: none !important; }
.step-count { font-size: .78rem; color: var(--muted); font-weight: 500; }

/* ── Cards & sections ───────────────────────────────────────────── */
.card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; }
.card-head { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.card-body { padding: 24px; }
.section-title { font-family: var(--font-head); font-weight: 700; font-size: 1.5rem; color: var(--p); margin-bottom: 6px; }
.section-sub { color: var(--muted); font-size: .88rem; margin-bottom: 24px; line-height: 1.6; }
.label { font-size: .75rem; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; display: block; }
.input { width: 100%; border: 1.5px solid var(--border); border-radius: 8px; padding: 10px 14px; font-family: var(--font-body); font-size: .9rem; color: var(--text); background: var(--card); transition: border-color var(--trans); outline: none; }
.input:focus { border-color: var(--p3); box-shadow: 0 0 0 3px rgba(26,123,196,.12); }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

/* ── Step 0 — Role cards ──────────────────────────────────────── */
.role-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 24px; }
.role-card {
  border: 2px solid var(--border); border-radius: var(--radius); padding: 22px 20px;
  cursor: pointer; transition: all var(--trans); background: var(--card);
  position: relative; overflow: hidden;
}
.role-card::after {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--p); transform: scaleX(0); transition: transform var(--trans);
  transform-origin: left;
}
.role-card:hover { border-color: var(--p3); transform: translateY(-2px); box-shadow: var(--shadow); }
.role-card:hover::after { transform: scaleX(1); }
.role-card.selected { border-color: var(--p); background: var(--pxl); }
.role-card.selected::after { transform: scaleX(1); }
.role-icon { font-size: 1.8rem; margin-bottom: 10px; }
.role-name { font-family: var(--font-head); font-weight: 700; font-size: 1.05rem; color: var(--p); margin-bottom: 6px; }
.role-desc { font-size: .8rem; color: var(--muted); line-height: 1.55; }
.role-check { position: absolute; top: 14px; right: 14px; width: 22px; height: 22px; border-radius: 50%; background: var(--p); display: none; align-items: center; justify-content: center; color: #fff; font-size: .75rem; }
.role-card.selected .role-check { display: flex; }

/* ── Step 1 — Instructions ─────────────────────────────────────── */
.process-steps { display: flex; flex-direction: column; gap: 0; }
.proc-step {
  display: flex; gap: 16px; padding: 16px 0;
  border-bottom: 1px solid var(--border); cursor: pointer;
  transition: all var(--trans);
}
.proc-step:last-child { border-bottom: none; }
.proc-num {
  width: 32px; height: 32px; border-radius: 50%; background: var(--p); color: #fff;
  display: flex; align-items: center; justify-content: center; font-weight: 700;
  font-size: .85rem; flex-shrink: 0; margin-top: 2px;
}
.proc-content { flex: 1; }
.proc-title { font-weight: 600; font-size: .93rem; color: var(--text); }
.proc-body { font-size: .83rem; color: var(--muted); margin-top: 6px; line-height: 1.6; display: none; }
.proc-step.open .proc-body { display: block; animation: fadeIn .2s ease; }
.proc-arrow { color: var(--muted); transition: transform var(--trans); font-size: .9rem; padding-top: 5px; }
.proc-step.open .proc-arrow { transform: rotate(180deg); }

.principles { background: var(--pxl); border: 1px solid var(--border); border-left: 4px solid var(--p); border-radius: var(--radius); padding: 18px 20px; }
.principles-title { font-weight: 700; font-size: .88rem; color: var(--p); margin-bottom: 10px; }
.principle { display: flex; gap: 10px; margin-bottom: 8px; font-size: .82rem; color: var(--text); line-height: 1.55; }
.principle::before { content: '›'; color: var(--acc); font-weight: 700; flex-shrink: 0; }

/* ── Step 2 — Goals ────────────────────────────────────────────── */
.goal-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
.goal-table th { background: var(--p); color: #fff; font-size: .77rem; font-weight: 600; letter-spacing: .4px; text-transform: uppercase; padding: 10px 14px; text-align: left; }
.goal-table td { border-bottom: 1px solid var(--border); padding: 6px 6px; vertical-align: top; }
.goal-table tr:hover td { background: var(--pxl); }
.goal-input { width: 100%; border: none; background: transparent; font-family: var(--font-body); font-size: .85rem; color: var(--text); padding: 6px 8px; border-radius: 6px; outline: none; resize: vertical; min-height: 36px; }
.goal-input:focus { background: white; box-shadow: 0 0 0 2px var(--p3); }
.level-select { border: 1.5px solid var(--border); border-radius: 8px; padding: 6px 10px; font-family: var(--font-body); font-size: .82rem; background: var(--card); color: var(--text); cursor: pointer; width: 100%; }
.btn-add-goal { display: flex; align-items: center; gap: 8px; background: none; border: 2px dashed var(--border); border-radius: 8px; padding: 10px 16px; font-size: .83rem; font-weight: 600; color: var(--muted); cursor: pointer; width: 100%; justify-content: center; margin-top: 8px; transition: all var(--trans); font-family: var(--font-body); }
.btn-add-goal:hover { border-color: var(--p3); color: var(--p); background: var(--pxl); }
.btn-del { background: none; border: none; color: #ddd; cursor: pointer; font-size: 1.1rem; padding: 4px 8px; border-radius: 6px; transition: all var(--trans); }
.btn-del:hover { background: var(--some-bg); color: var(--some-tx); }

/* ── Step 3 — Competencies ──────────────────────────────────────── */
.comp-cards { display: flex; flex-direction: column; gap: 12px; }
.comp-card { background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: box-shadow var(--trans); }
.comp-card:hover { box-shadow: var(--shadow); }
.comp-card.has-rating { border-color: transparent; }
.comp-card.has-rating.r-over { border-color: var(--over-bd); box-shadow: 0 0 0 1px var(--over-bd), 0 2px 8px rgba(6,95,70,.08); }
.comp-card.has-rating.r-all  { border-color: var(--all-bd);  box-shadow: 0 0 0 1px var(--all-bd),  0 2px 8px rgba(30,58,138,.08); }
.comp-card.has-rating.r-most { border-color: var(--most-bd); box-shadow: 0 0 0 1px var(--most-bd), 0 2px 8px rgba(120,53,15,.08); }
.comp-card.has-rating.r-some { border-color: var(--some-bd); box-shadow: 0 0 0 1px var(--some-bd), 0 2px 8px rgba(127,29,29,.08); }

.comp-header {
  padding: 16px 20px; display: flex; align-items: center; gap: 14px;
  cursor: pointer; transition: background var(--trans); user-select: none;
}
.comp-header:hover { background: var(--bg); }
.comp-num { width: 28px; height: 28px; border-radius: 8px; background: var(--pxl); color: var(--p); font-weight: 800; font-size: .82rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-family: var(--font-head); }
.comp-title-wrap { flex: 1; }
.comp-title { font-weight: 700; font-size: .95rem; color: var(--p); font-family: var(--font-head); }
.comp-desc-short { font-size: .76rem; color: var(--muted); margin-top: 2px; }
.comp-badges { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.rating-badge { padding: 4px 10px; border-radius: 999px; font-size: .72rem; font-weight: 700; letter-spacing: .3px; }
.rating-badge.over { background: var(--over-bg); color: var(--over-tx); }
.rating-badge.all  { background: var(--all-bg);  color: var(--all-tx); }
.rating-badge.most { background: var(--most-bg); color: var(--most-tx); }
.rating-badge.some { background: var(--some-bg); color: var(--some-tx); }
.comp-chevron { color: var(--muted); font-size: .85rem; transition: transform var(--trans); }
.comp-card.open .comp-chevron { transform: rotate(180deg); }

.comp-body { display: none; border-top: 1px solid var(--border); }
.comp-card.open .comp-body { display: block; animation: fadeIn .25s ease; }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

.comp-inner { padding: 20px; }

/* Role focus tag */
.role-focus {
  background: linear-gradient(135deg, var(--pxl), #fff);
  border: 1px solid var(--border); border-radius: 10px;
  padding: 12px 16px; margin-bottom: 18px;
  display: flex; align-items: flex-start; gap: 10px;
}
.role-focus-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }
.role-focus-content { font-size: .8rem; color: var(--text); line-height: 1.55; }
.role-focus-label { font-weight: 700; color: var(--p); font-size: .72rem; letter-spacing: .4px; text-transform: uppercase; margin-bottom: 3px; }

/* Coaching questions */
.questions-toggle {
  display: inline-flex; align-items: center; gap: 6px;
  background: none; border: 1.5px solid var(--border); border-radius: 8px;
  padding: 6px 12px; font-size: .77rem; font-weight: 600; color: var(--muted);
  cursor: pointer; transition: all var(--trans); font-family: var(--font-body);
  margin-bottom: 16px;
}
.questions-toggle:hover { background: var(--pxl); border-color: var(--p3); color: var(--p); }
.questions-toggle.open { background: var(--pxl); border-color: var(--p); color: var(--p); }
.questions-panel {
  background: #f8faff; border: 1px solid var(--all-bd); border-radius: 10px;
  padding: 14px 16px; margin-bottom: 16px; display: none;
}
.questions-panel.open { display: block; animation: fadeIn .2s ease; }
.questions-panel li { font-size: .82rem; color: var(--text); line-height: 1.6; margin-bottom: 8px; padding-left: 14px; position: relative; }
.questions-panel li::before { content: '?'; position: absolute; left: 0; color: var(--p3); font-weight: 700; font-size: .72rem; top: 2px; }
.questions-panel li:last-child { margin-bottom: 0; }

/* Level selector */
.level-selector { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.level-btn {
  border: 2px solid var(--border); border-radius: 10px; padding: 10px 8px;
  cursor: pointer; transition: all var(--trans); background: var(--card);
  text-align: center; font-family: var(--font-body);
}
.level-btn .lb-label { font-size: .72rem; font-weight: 700; letter-spacing: .2px; line-height: 1.3; }
.level-btn:hover { transform: translateY(-2px); }
.level-btn.over:hover, .level-btn.over.sel { background: var(--over-bg); border-color: var(--over-bd); }
.level-btn.over.sel .lb-label { color: var(--over-tx); }
.level-btn.all:hover, .level-btn.all.sel { background: var(--all-bg); border-color: var(--all-bd); }
.level-btn.all.sel .lb-label { color: var(--all-tx); }
.level-btn.most:hover, .level-btn.most.sel { background: var(--most-bg); border-color: var(--most-bd); }
.level-btn.most.sel .lb-label { color: var(--most-tx); }
.level-btn.some:hover, .level-btn.some.sel { background: var(--some-bg); border-color: var(--some-bd); }
.level-btn.some.sel .lb-label { color: var(--some-tx); }
.level-btn.sel { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.1); }

/* Indicators */
.indicators-panel { display: none; border-radius: 10px; padding: 14px 16px; margin-bottom: 16px; }
.indicators-panel.visible { display: block; animation: fadeIn .25s ease; }
.indicators-panel.over { background: var(--over-bg); border: 1px solid var(--over-bd); }
.indicators-panel.all  { background: var(--all-bg);  border: 1px solid var(--all-bd); }
.indicators-panel.most { background: var(--most-bg); border: 1px solid var(--most-bd); }
.indicators-panel.some { background: var(--some-bg); border: 1px solid var(--some-bd); }
.ind-title { font-size: .72rem; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; margin-bottom: 8px; }
.indicators-panel.over .ind-title { color: var(--over-tx); }
.indicators-panel.all  .ind-title { color: var(--all-tx); }
.indicators-panel.most .ind-title { color: var(--most-tx); }
.indicators-panel.some .ind-title { color: var(--some-tx); }
.ind-item { display: flex; gap: 8px; font-size: .8rem; margin-bottom: 6px; line-height: 1.5; }
.ind-item::before { content: '✓'; font-weight: 700; flex-shrink: 0; }
.indicators-panel.some .ind-item::before { content: '!'; }
.indicators-panel.over .ind-item { color: var(--over-tx); }
.indicators-panel.all  .ind-item { color: var(--all-tx); }
.indicators-panel.most .ind-item { color: var(--most-tx); }
.indicators-panel.some .ind-item { color: var(--some-tx); }

.textarea { width: 100%; border: 1.5px solid var(--border); border-radius: 8px; padding: 10px 14px; font-family: var(--font-body); font-size: .85rem; color: var(--text); resize: vertical; min-height: 80px; outline: none; transition: border-color var(--trans); }
.textarea:focus { border-color: var(--p3); box-shadow: 0 0 0 3px rgba(26,123,196,.1); }

/* ── Step 4 — Summary ───────────────────────────────────────────── */
.summary-grid { display: flex; flex-direction: column; gap: 8px; }
.summary-row {
  display: flex; align-items: center; gap: 12px;
  background: var(--card); border: 1.5px solid var(--border); border-radius: 10px;
  padding: 14px 18px; transition: all var(--trans);
}
.sum-num { width: 26px; height: 26px; border-radius: 7px; background: var(--pxl); color: var(--p); font-weight: 800; font-size: .78rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.sum-title { flex: 1; font-weight: 600; font-size: .87rem; color: var(--text); }
.sum-rating { flex-shrink: 0; }
.sum-comment { font-size: .76rem; color: var(--muted); font-style: italic; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
.sum-na { font-size: .75rem; color: var(--muted); font-style: italic; }

.overall-select { margin-top: 24px; }
.overall-buttons { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; margin-top: 10px; }
.overall-btn {
  border: 2px solid var(--border); border-radius: 10px; padding: 14px 10px;
  cursor: pointer; text-align: center; transition: all var(--trans); background: var(--card);
  font-family: var(--font-body);
}
.overall-btn .ob-label { font-size: .78rem; font-weight: 700; line-height: 1.3; }
.overall-btn .ob-sub { font-size: .68rem; color: var(--muted); margin-top: 4px; }
.overall-btn.over.sel { background: var(--over-bg); border-color: var(--over-bd); }

/* ── Step 5 — Action plan ───────────────────────────────────────── */

.action-table td { border-bottom: 1px solid var(--border); padding: 6px 4px; }

.sign-section { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 24px; }

/* ── Callouts ───────────────────────────────────────────────────── */
.callout { border-radius: 10px; padding: 14px 18px; margin-bottom: 20px; display: flex; gap: 12px; align-items: flex-start; }
.callout.info { background: var(--pxl); border: 1px solid var(--all-bd); }
.callout.warn { background: var(--most-bg); border: 1px solid var(--most-bd); }

/* ── Mobile overlay ─────────────────────────────────────────────── */
#sb-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 99; }

/* ── Print ──────────────────────────────────────────────────────── */
@media print {
  #sidebar, #topbar, #navfoot, #sb-overlay { display: none !important; }
  #main { margin-left: 0 !important; }
  #content { padding: 0 !important; max-width: none !important; }

}

/* ── Responsive ─────────────────────────────────────────────────── */
@media (max-width: 768px) {
  #sidebar { transform: translateX(calc(-1 * var(--sidebar-w))); }

}

function load() {
  try {
    const saved = localStorage.getItem('ahlsell_lon_v2');
    if (saved) S = JSON.parse(saved);
  } catch(e) {}
}
function save() {
  try { localStorage.setItem('ahlsell_lon_v2', JSON.stringify(S)); } catch(e){}
}
function setState(patch) { Object.assign(S, patch); save(); render(); }

// ══════════════════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════════════════
const h = (tag, cls, html, attrs='') =>
  `<${tag} class="${cls}" ${attrs}>${html}</${tag}>`;

const levelMeta = { over:LEVELS[3], all:LEVELS[2], most:LEVELS[1], some:LEVELS[0] };

function levelBadge(lvl) {
  if (!lvl) return '';
  const m = levelMeta[lvl];
  return `<span class="rating-badge ${lvl}">${m.short}</span>`;
}

function visibleComps() {
  return COMPS.filter(c => !c.chefOnly || S.role === 'chef');
}

function completedSteps() {
  const done = new Set();
  if (S.role) done.add(0);
  if (S.meta.employee && S.meta.manager) done.add(1);
  if (S.goals.some(g => g.goal)) done.add(2);
  const vComps = visibleComps();
  if (vComps.every(c => S.ratings[c.id]?.level)) done.add(3);
  if (S.overallLevel) done.add(4);
  return done;
}

// ══════════════════════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════════════════════
function render() {
  renderSidebar();
  renderTopbar();
  renderContent();
  renderNavfoot();
}

function renderSidebar() {
  const done = completedSteps();
  const stepsHtml = STEPS.map((st, i) => {
    const cls = [
      'sb-step',
      i === S.step ? 'active' : '',
      done.has(i) && i !== S.step ? 'done' : '',
    ].join(' ');
    const numInner = done.has(i) && i !== S.step ? '✓' : (i+1);
    return `<div class="${cls}" onclick="goStep(${i})">
      <div class="step-num">${numInner}</div>
      <div>
        <div class="step-label">${st.label}</div>
        <div class="step-sub">${st.sub}</div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('sb-steps').innerHTML = stepsHtml;

  const pill = document.getElementById('sb-role-pill');
  const pillText = document.getElementById('sb-role-text');
  if (S.role) {
    pill.style.display = 'flex';
    pillText.textContent = ROLES[S.role].label;
  } else {
    pill.style.display = 'none';
  }
}

function renderTopbar() {
  const total = STEPS.length;
  const pct = Math.round(((S.step + 1) / total) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = `Steg ${S.step+1}/${total}`;
  document.getElementById('topbar-title').textContent = STEPS[S.step].label;
}

function renderContent() {
  const el = document.getElementById('content');
  const renders = [
    renderStep0, renderStep1, renderStep2,
    renderStep3, renderStep4, renderStep5,
  ];
  el.innerHTML = `<div class="step-view">${renders[S.step]()}</div>`;
  bindEvents();
}

function renderNavfoot() {
  const prev = document.getElementById('btn-prev');
  const next = document.getElementById('btn-next');
  const count = document.getElementById('step-count');

  prev.disabled = S.step === 0;
  next.textContent = S.step === STEPS.length - 1 ? '🖨 Skriv ut' : 'Nästa →';
  next.onclick = S.step === STEPS.length - 1
    ? () => window.print()
    : () => goStep(S.step + 1);
  prev.onclick = () => goStep(S.step - 1);

  const done = completedSteps();
  const total = visibleComps().length;
  const rated = visibleComps().filter(c => S.ratings[c.id]?.level).length;
  count.textContent = S.step === 3
    ? `${rated}/${total} kompetenser bedömda`
    : STEPS[S.step].sub;
}

function renderCompCard(c) {
  const rating = S.ratings[c.id] || {};

  const cardCls = ['comp-card', lvl ? 'has-rating r-'+lvl : '', 'open' /* start open for first */ ].join(' ');

  const roleFocusTxt = S.role && c.roleFocus[S.role]
    ? c.roleFocus[S.role]
    : (c.roleFocus.chef || '');

  const levelBtns = LEVELS.map(l => `
    <div class="level-btn ${l.cls} ${lvl===l.id?'sel':''}" onclick="setRating('${c.id}','${l.id}')">
      <div class="lb-label">${l.short}</div>
    </div>
  `).join('');

  const indicatorsHtml = LEVELS.map(l => {
    const items = c.indicators[l.id].map(i => `<div class="ind-item">${i}</div>`).join('');
    return `<div class="indicators-panel ${l.cls} ${lvl===l.id?'visible':''}" id="ind-${c.id}-${l.id}">
      <div class="ind-title">${l.label}</div>
      ${items}
    </div>`;
  }).join('');

  const questionsHtml = c.questions.map(q => `<li>${q}</li>`).join('');

  return `
    <div class="comp-card ${lvl?'has-rating r-'+lvl:''}" id="card-${c.id}">
      <div class="comp-header" onclick="toggleComp('${c.id}')">
        <div class="comp-num">${COMPS.indexOf(c)+1}</div>
        <div class="comp-title-wrap">
          <div class="comp-title">${c.title}</div>
          <div class="comp-desc-short">${c.desc}</div>
        </div>
        <div class="comp-badges">
          ${lvl ? levelBadge(lvl) : ''}
          <div class="comp-chevron">▾</div>
        </div>
      </div>
      <div class="comp-body">
        <div class="comp-inner">
          ${roleFocusTxt ? `
          <div class="role-focus">
            <div class="role-focus-icon">${ROLES[S.role]?.icon||'🎯'}</div>
            <div class="role-focus-content">
              <div class="role-focus-label">${ROLES[S.role]?.label} — rollens fokus</div>
              ${roleFocusTxt}
            </div>
          </div>` : ''}

          <button class="questions-toggle" id="qtog-${c.id}" onclick="toggleQuestions('${c.id}')">
            💬 Stödfrågor att ställa i samtalet
          </button>
          <div class="questions-panel" id="qpanel-${c.id}">
            <ol style="padding-left:4px;list-style:none">${questionsHtml}</ol>
          </div>

          <label class="label" style="margin-bottom:8px">Välj bedömningsnivå</label>
          <div class="level-selector">${levelBtns}</div>

          ${indicatorsHtml}

          <label class="label" style="margin-top:8px">Motivering och konkreta exempel</label>
          <textarea class="textarea" placeholder="Beskriv din bedömning med konkreta observationer och exempel…" oninput="setComment('${c.id}',this.value)">${rating.comment||''}</textarea>
        </div>
      </div>
    </div>
  `;
}

// ══════════════════════════════════════════════════════════════════
//  BIND EVENTS (called after render)
// ══════════════════════════════════════════════════════════════════
function bindEvents() {
  // Auto-open first unrated comp card
  if (S.step === 3) {
    const comps = visibleComps();
    const firstUnrated = comps.find(c => !S.ratings[c.id]?.level);
    // By default all cards are closed. Open first unrated:
    const toOpen = firstUnrated || comps[0];
    if (toOpen) {
      const el = document.getElementById('card-' + toOpen.id);
      if (el) el.classList.add('open');
    }
  }
}

// ══════════════════════════════════════════════════════════════════
//  ACTIONS
// ══════════════════════════════════════════════════════════════════
function goStep(n) {
  if (n < 0 || n >= STEPS.length) return;
  S.step = n; save();
  render();
  document.getElementById('content').scrollIntoView({ behavior:'smooth', block:'start' });
  closeSidebar();
}

function selectRole(id) {
  S.role = id; save(); render();
}

function updateMeta(key, val) {
  S.meta[key] = val; save();
  // Lightweight update — don't re-render everything
  const pill = document.getElementById('sb-role-text');
  if (pill && S.role) pill.textContent = ROLES[S.role].label;
}

function updateGoal(i, key, val) {
  S.goals[i][key] = val; save();
}

function addGoal() {
  S.goals.push({ goal:'', outcome:'', level:'' }); save();
  render();
}

function removeGoal(i) {
  S.goals.splice(i, 1); save(); render();
}

function setRating(compId, level) {
  if (!S.ratings[compId]) S.ratings[compId] = { level:'', comment:'' };
  S.ratings[compId].level = level; save();

  // Update card class
  const card = document.getElementById('card-' + compId);
  if (card) {
    card.className = card.className.replace(/has-rating r-\w+/g, '').trim();
    card.classList.add('has-rating', 'r-' + level);
  }

  // Update level buttons
  LEVELS.forEach(l => {
    const btn = card?.querySelector('.level-btn.' + l.cls);
    if (btn) btn.classList.toggle('sel', l.id === level);
  });

  // Update indicators
  LEVELS.forEach(l => {
    const panel = document.getElementById(`ind-${compId}-${l.id}`);
    if (panel) panel.classList.toggle('visible', l.id === level);
  });

  // Update badge in header
  const badges = card?.querySelector('.comp-badges');
  if (badges) {
    const existing = badges.querySelector('.rating-badge');
    if (existing) existing.remove();
    badges.insertAdjacentHTML('afterbegin', levelBadge(level));
  }

  // Update sidebar done count
  renderSidebar();
  renderNavfoot();
}

function setComment(compId, val) {
  if (!S.ratings[compId]) S.ratings[compId] = { level:'', comment:'' };
  S.ratings[compId].comment = val; save();
}

function setOverall(level) {
  S.overallLevel = level; save();
  // Update buttons without full re-render
  document.querySelectorAll('.overall-btn').forEach(btn => {
    LEVELS.forEach(l => {
      if (btn.classList.contains(l.cls)) btn.classList.toggle('sel', l.id === level);
    });
  });
  renderSidebar();
}

function updateOverallComment(val) { S.overallComment = val; save(); }
function updateNotes(val) { S.notes = val; save(); }
function updateAction(i, key, val) { S.actions[i][key] = val; save(); }
function addAction() { S.actions.push({area:'',action:'',responsible:'',date:''}); save(); render(); }
function removeAction(i) { S.actions.splice(i,1); save(); render(); }

function toggleComp(id) {
  const card = document.getElementById('card-' + id);
  if (card) card.classList.toggle('open');
}

function toggleProc(el) { el.classList.toggle('open'); }

function toggleQuestions(compId) {
  const tog = document.getElementById('qtog-' + compId);
  const panel = document.getElementById('qpanel-' + compId);
  if (tog && panel) {
    tog.classList.toggle('open');
    panel.classList.toggle('open');
  }
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sb-overlay').classList.toggle('show');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sb-overlay').classList.remove('show');
}

document.getElementById('menu-btn').onclick = toggleSidebar;
document.getElementById('sb-overlay').onclick = closeSidebar;

// ══════════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════════
load();
render();
</script>
</body>
</html>
